services:
  web:
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  api:
    command: python -m uvicorn oderbiz_analytics.api.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - analytics_data:/data
      - ./backend:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - WATCHFILES_FORCE_POLLING=true
