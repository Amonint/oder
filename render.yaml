services:
  - type: web
    name: oderbiz-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: pip install -e .
    startCommand: uvicorn oderbiz_analytics.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DUCKDB_PATH
        value: /tmp/analytics.duckdb
      - key: DATABASE_URL
        sync: false

  - type: web
    name: oderbiz-frontend
    runtime: node
    rootDir: frontend
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: VITE_API_BASE_URL
        sync: false
